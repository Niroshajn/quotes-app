<!DOCTYPE html>
<html>
<head>
  <title>Quotes App</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
       background: #f0f0f0;
      color: #111;

      display: flex;
      justify-content: center;   /* horizontal center */
      align-items: center;       /* vertical center */
      height: 100vh;
      text-align: center;
    }

    .container {
      width: 90%;
      max-width: 900px;
    }

    .quote {
      font-size: 28px;
      line-height: 1.4;
    }

    .author {
      margin-top: 15px;
      font-size: 18px;
      opacity: 0.7;
    }

    /* 📱 Small device (800x480) */
    @media (max-width: 900px) {
      .quote {
        font-size: 20px;
      }
      .author {
        font-size: 14px;
      }
    }

    /* 🖥 Large device (1200x1600) */
    @media (min-width: 1200px) {
      .quote {
        font-size: 36px;
      }
      .author {
        font-size: 22px;
      }
    }
  </style>

</head>
<body>

  <div class="container">
    <div id="quote"></div>
  </div>

  <script>
    const url = "https://api.rss2json.com/v1/api.json?rss_url=https://feeds.feedburner.com/theysaidso/qod";

    fetch(url)
      .then(res => res.json())
      .then(data => {
        const item = data.items[0];
        const cleanText = item.description.replace(/<[^>]*>/g, "");
        let author = "Unknown";
        const match = cleanText.match(/― (.*)/);
        if (match) {
          author = match[1];
        }

        document.getElementById("quote").innerHTML = `
          <div class="quote">"${cleanText}"</div>
          <div class="author">- ${author}</div>
        `;
      })
      .catch(err => console.log(err));
  </script>

</body>
</html>
